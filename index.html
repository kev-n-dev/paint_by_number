<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint by Number Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Header / Toolbar -->
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/><circle cx="8.5" cy="7.5" r="1" fill="currentColor"/><circle cx="6.5" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="6" r="1" fill="currentColor"/><circle cx="16" cy="9" r="1" fill="currentColor"/></svg>
        PBN Studio
      </div>

      <div class="toolbar">
        <button class="btn-icon" id="newImageBtn" title="New Image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/></svg>
        </button>
      </div>

      <div class="header-spacer"></div>

      <div class="header-right">
        <button class="btn btn-ghost btn-sm" id="saveDesignBtn">💾 Save</button>
        <button class="btn btn-ghost btn-sm" id="myDesignsBtn">Gallery <span class="badge" id="designCount">0</span></button>
      </div>
    </header>

    <!-- Main Canvas Viewport -->
    <main class="canvas-viewport" id="canvasViewport">
      <!-- Upload state -->
      <div class="upload-state" id="uploadState">
        <div class="dropzone" id="dropZone">
          <input type="file" id="imageInput" accept="image/*" hidden>
          <div class="dropzone-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 5h6M19 2v6M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/><circle cx="9" cy="9" r="2"/></svg>
          </div>
          <p class="dropzone-title">Drop image here</p>
          <p class="dropzone-sub">or <label class="dropzone-link" for="imageInput">browse files</label></p>
          <p class="dropzone-hint">JPEG · PNG · WEBP</p>
        </div>
      </div>

      <!-- Result views (hidden until generated) -->
      <div class="comparison-container" id="comparisonContainer" hidden>
        <div class="comparison-slider" id="comparisonSlider">
          <canvas id="resultCanvasAfter" class="comparison-layer"></canvas>
          <div class="comparison-clip" id="comparisonClip">
            <canvas id="resultCanvasBefore" class="comparison-layer"></canvas>
          </div>
          <div class="comparison-handle" id="comparisonHandle">
            <div class="comparison-line"></div>
            <div class="comparison-knob">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>
          <div class="comparison-labels">
            <span>Original</span>
            <span>Result</span>
          </div>
        </div>
      </div>

      <div class="single-view" id="singleView" hidden>
        <canvas id="filledCanvas"></canvas>
        <canvas id="outlineCanvas" hidden></canvas>
        <canvas id="paletteCanvas" hidden></canvas>
      </div>

      <!-- Processing overlay -->
      <div class="processing-overlay" id="processingOverlay" hidden>
        <div class="processing-preview-wrap">
          <canvas id="processingCanvas"></canvas>
        </div>
        <div class="progress-info">
          <p class="processing-label" id="processingLabel">Processing...</p>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="processing-percent" id="processingPercent">0%</p>
        </div>
      </div>
    </main>

    <!-- Right Panel -->
    <aside class="panel" id="rightPanel">
      <!-- View Tabs -->
      <div class="tab-bar" id="viewTabs">
        <button class="tab active" data-view="comparison">Compare</button>
        <button class="tab" data-view="filled">Filled</button>
        <button class="tab" data-view="outline">Outline</button>
        <button class="tab" data-view="palette">Colors</button>
      </div>

      <!-- Settings -->
      <div class="panel-section">
        <div class="panel-section-header">
          <span class="panel-section-title">Settings</span>
        </div>

        <div class="control-row">
          <span class="control-label">Colors</span>
        </div>
        <div class="color-presets">
          <button class="color-preset active" data-colors="24">
            <strong>24</strong>
            <span>Beginner</span>
          </button>
          <button class="color-preset" data-colors="36">
            <strong>36</strong>
            <span>+5hrs</span>
          </button>
          <button class="color-preset" data-colors="48">
            <strong>48</strong>
            <span>+10hrs</span>
          </button>
        </div>
        <input type="range" id="colorSlider" min="6" max="60" step="1" value="24">
        <div class="control-row">
          <span class="control-label" style="font-size:10px;color:var(--text-muted)">or drag for custom</span>
          <span class="control-value" id="colorCountValue">24</span>
        </div>

        <div class="control-row">
          <span class="control-label">Detail</span>
          <span class="control-value" id="smoothValue">3</span>
        </div>
        <input type="range" id="smoothSlider" min="1" max="8" step="1" value="3">

        <div class="control-row">
          <span class="control-label">Min Region</span>
          <span class="control-value" id="minRegionValue">60</span>
        </div>
        <input type="range" id="minRegionSlider" min="20" max="300" step="10" value="60">

        <div class="control-row">
          <span class="control-label">Width</span>
          <span class="control-value" id="widthValue">1000</span>
        </div>
        <input type="range" id="widthSlider" min="600" max="2000" step="50" value="1000">

        <div class="control-row" style="margin-top:8px">
          <span class="control-label">Color Space</span>
        </div>
        <select id="colorSpaceSelect" class="select-input">
          <option value="lab" selected>CIE Lab (perceptual)</option>
          <option value="rgb">RGB (fast)</option>
        </select>
      </div>

      <!-- Generate Button -->
      <div class="panel-section">
        <button class="btn btn-primary btn-full btn-lg" id="generateBtn" disabled>
          <span id="generateText">Generate</span>
          <span id="generateSpinner" class="btn-spinner" hidden></span>
        </button>
      </div>

      <!-- Stats -->
      <div class="panel-section" id="statsSection" hidden>
        <div class="panel-section-header">
          <span class="panel-section-title">Output</span>
        </div>
        <div id="statsBar" style="font-size:11px; color:var(--text-secondary); display:flex; flex-direction:column; gap:4px;"></div>
      </div>

      <!-- Export -->
      <div class="panel-section" id="exportSection" hidden>
        <div class="panel-section-header">
          <span class="panel-section-title">Export</span>
        </div>
        <div class="export-buttons">
          <button class="btn btn-secondary btn-full" id="dlOutlineBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Outline + Numbers
          </button>
          <button class="btn btn-secondary btn-full" id="dlOutlineColorBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Outline + Numbers + Light Color
          </button>
          <button class="btn btn-secondary btn-full" id="dlPaletteBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
            Color Palette
          </button>
          <button class="btn btn-secondary btn-full" id="dlFilledBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            Finished Painting
          </button>
          <button class="btn btn-secondary btn-full" id="dlFilledOutlineBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
            Finished + Outline (no numbers)
          </button>
          <div style="border-top:1px solid var(--border); margin:6px 0;"></div>
          <button class="btn btn-primary btn-full" id="dlPdfBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/></svg>
            Download PDF (3 pages)
          </button>
        </div>
      </div>
    </aside>

    <!-- My Designs Modal -->
    <div class="modal-backdrop" id="designsModal" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3>Gallery</h3>
          <button class="btn btn-ghost btn-sm" id="closeModal">✕</button>
        </div>
        <div class="modal-body" id="designsGrid"></div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
