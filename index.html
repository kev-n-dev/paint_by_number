<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint by Number</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">

    <!-- ── Left panel: always-visible settings ── -->
    <aside class="settings-panel">
      <div class="panel-header">
        <h1>🎨 Paint by Number</h1>
      </div>

      <!-- Upload (compact, in panel) -->
      <div class="panel-section panel-upload">
        <div class="upload-area-sm" id="dropZone">
          <input type="file" id="imageInput" accept="image/*" hidden>
          <div class="upload-placeholder" id="uploadPlaceholder">
            <span class="upload-icon-sm">📁</span>
            <label class="upload-link" for="imageInput">Upload image</label>
          </div>
          <div class="upload-preview-sm" id="uploadPreview" hidden>
            <img id="previewImg" alt="Preview">
            <button class="remove-btn-sm" id="removeBtn" aria-label="Remove image">✕</button>
          </div>
        </div>
      </div>

      <!-- Style picker -->
      <div class="panel-section">
        <h2 class="panel-section-title">Style</h2>
        <div class="style-grid" id="styleGrid">
          <button class="style-card active" data-style="none"><span class="style-icon">🚫</span><span>None</span></button>
          <button class="style-card" data-style="realistic"><span class="style-icon">📷</span><span>Realistic</span></button>
          <button class="style-card" data-style="watercolor"><span class="style-icon">💧</span><span>Watercolor</span></button>
          <button class="style-card" data-style="cartoon"><span class="style-icon">✏️</span><span>Cartoon</span></button>
          <button class="style-card" data-style="posterize"><span class="style-icon">🎭</span><span>Pop Art</span></button>
          <button class="style-card" data-style="softpastel"><span class="style-icon">🌸</span><span>Pastel</span></button>
          <button class="style-card" data-style="oilpaint"><span class="style-icon">🖌️</span><span>Oil Paint</span></button>
          <button class="style-card" data-style="oilpaint2"><span class="style-icon">🎨</span><span>Oil Paint 2</span></button>
        </div>
      </div>

      <!-- Image adjustments -->
      <div class="panel-section">
        <h2 class="panel-section-title">Image</h2>
        <div class="control-group">
          <label for="sharpness">Sharpness</label>
          <div class="range-wrap">
            <input type="range" id="sharpness" min="0" max="200" step="10" value="80">
            <span class="range-val" id="sharpnessVal">80%</span>
          </div>
        </div>
        <div class="control-group">
          <label for="structure">Structure</label>
          <div class="range-wrap">
            <input type="range" id="structure" min="0" max="200" step="10" value="15">
            <span class="range-val" id="structureVal">15%</span>
          </div>
        </div>
        <div class="control-group">
          <label for="brightness">Brightness</label>
          <div class="range-wrap">
            <input type="range" id="brightness" min="-100" max="100" step="5" value="0">
            <span class="range-val" id="brightnessVal">0</span>
          </div>
        </div>
        <div class="control-group">
          <label for="contrast">Contrast</label>
          <div class="range-wrap">
            <input type="range" id="contrast" min="-100" max="100" step="5" value="0">
            <span class="range-val" id="contrastVal">0</span>
          </div>
        </div>
        <div class="control-group">
          <label for="saturation">Saturation</label>
          <div class="range-wrap">
            <input type="range" id="saturation" min="-100" max="100" step="5" value="0">
            <span class="range-val" id="saturationVal">0</span>
          </div>
        </div>
        <div class="control-group">
          <label for="warmth">Warmth</label>
          <div class="range-wrap">
            <input type="range" id="warmth" min="-100" max="100" step="5" value="0">
            <span class="range-val" id="warmthVal">0</span>
          </div>
        </div>
        <label class="toggle-label">
          <input type="checkbox" id="cartoonOutlines">
          <span>Cartoon outlines</span>
        </label>
      </div>

      <!-- Paint-by-number settings -->
      <div class="panel-section">
        <h2 class="panel-section-title">Canvas</h2>
        <div class="control-group">
          <label for="pageSize">Print Size</label>
          <select id="pageSize" class="select-input">
            <option value="custom">Custom</option>
            <option value="4x6">4×6 Photo</option>
            <option value="5x7">5×7 Photo</option>
            <option value="a5">A5 (148×210mm)</option>
            <option value="letter" selected>Letter (8.5×11")</option>
            <option value="a4">A4 (210×297mm)</option>
            <option value="a3">A3 (297×420mm)</option>
            <option value="a2">A2 (420×594mm)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Canvas Dimensions (cm)</label>
          <div class="dim-row">
            <input type="number" id="canvasW" class="dim-input" value="21" min="1" max="200" placeholder="W">
            <span class="dim-sep">×</span>
            <input type="number" id="canvasH" class="dim-input" value="29.7" min="1" max="200" placeholder="H">
          </div>
        </div>
        <div class="control-group">
          <label for="colorCount">Colors</label>
          <div class="range-wrap">
            <input type="range" id="colorCount" min="4" max="32" value="8">
            <span class="range-val" id="colorCountVal">8</span>
          </div>
        </div>
        <div class="control-group">
          <label for="detailLevel">Detail <span id="detailAuto" class="detail-auto">(auto)</span></label>
          <div class="range-wrap">
            <input type="range" id="detailLevel" min="300" max="3000" step="100" value="600">
            <span class="range-val" id="detailVal">600px</span>
          </div>
        </div>
        <div class="control-group">
          <label for="minRegionSize">Min Region Size</label>
          <div class="range-wrap">
            <input type="range" id="minRegionSize" min="10" max="200" step="5" value="25">
            <span class="range-val" id="minRegionVal">25px</span>
          </div>
        </div>
        <div class="control-group">
          <label for="smoothness">Line Smoothness</label>
          <div class="range-wrap">
            <input type="range" id="smoothness" min="0" max="5" step="1" value="2">
            <span class="range-val" id="smoothnessVal">2</span>
          </div>
        </div>
      </div>

      <!-- Palette -->
      <div class="panel-section">
        <h2 class="panel-section-title">Palette</h2>
        <label class="toggle-label">
          <input type="checkbox" id="useCustomPalette">
          <span>Use my paints</span>
        </label>
        <div class="custom-palette" id="customPaletteUI" hidden>
          <div class="palette-picker-row">
            <select id="paletteSelect" aria-label="Select palette"></select>
            <button class="btn btn-ghost btn-sm" id="newPaletteBtn">＋ New</button>
            <button class="btn btn-ghost btn-sm" id="loadPresetBtn">📦 Presets</button>
            <button class="btn btn-ghost btn-sm" id="renamePaletteBtn">✎</button>
            <button class="btn btn-ghost btn-sm btn-danger-text" id="deletePaletteBtn">🗑</button>
          </div>
          <div class="palette-add-row">
            <input type="color" id="paintColorPicker" value="#e63946">
            <input type="text" id="paintNameInput" class="paint-name-input" placeholder="Color name (optional)">
            <button class="btn btn-primary btn-sm" id="addPaintBtn">Add</button>
          </div>
          <div class="paint-chips" id="paintChips"></div>
          <label class="toggle-label">
            <input type="checkbox" id="allowMixing">
            <span>Allow color mixing</span>
          </label>
          <p class="palette-hint" id="paletteHint">Add at least 2 colors.</p>
        </div>
      </div>

      <!-- Apply button -->
      <button class="btn btn-primary btn-generate" id="generateBtn" disabled>
        <span id="generateText">🎨 Apply</span>
        <span id="generateSpinner" class="spinner" hidden>
          <span class="spinner-brush">🖌️</span>
        </span>
      </button>
    </aside>

    <!-- ── Right panel: canvas area + info sidebar ── -->
    <main class="main-panel">

      <!-- Canvas column -->
      <div class="canvas-col">

        <!-- Style preview (shown after upload) -->
        <section class="card upload-card" id="stylePreviewCard" hidden>
          <div class="style-preview-wrap" id="stylePreviewSection">
            <canvas id="stylePreviewCanvas"></canvas>
          </div>
        </section>

        <!-- Result -->
        <section class="card result-card" id="output" hidden>
          <div class="difficulty-bar" id="difficultyBar"></div>
          <div class="output-toolbar">
            <button class="btn btn-primary" id="downloadBtn">⬇ PNG</button>
            <button class="btn btn-primary" id="downloadPdfBtn">⬇ PDF</button>
            <button class="btn btn-ghost" id="downloadLegendBtn">🏷️ Legend</button>
            <button class="btn btn-ghost" id="downloadPaintListBtn">📋 Paint List</button>
            <button class="btn btn-accent" id="previewAnimBtn">▶ Preview</button>
            <button class="btn btn-ghost" id="zoomInBtn">＋</button>
            <button class="btn btn-ghost" id="zoomOutBtn">－</button>
            <button class="btn btn-ghost" id="zoomResetBtn">Fit</button>
            <label class="toggle-label">
              <input type="checkbox" id="outlineOnly">
              <span>Outline only</span>
            </label>
          </div>
          <div class="compare-wrap" id="compareWrap" hidden>
            <canvas id="compareCanvas"></canvas>
            <div class="compare-slider" id="compareSlider"></div>
            <div class="compare-label compare-label-left">Original</div>
            <div class="compare-label compare-label-right">Paint by Number</div>
          </div>
          <div class="compare-toggle">
            <button class="btn btn-ghost btn-sm" id="toggleCompare">👁️ Before / After</button>
          </div>
          <div class="result-viewport" id="resultViewport">
            <canvas id="resultCanvas"></canvas>
          </div>
        </section>

      </div>

      <!-- Info sidebar: legend, coverage, order -->
      <aside class="info-aside card" id="infoAside" hidden>
        <div id="legend" class="legend legend-aside"></div>
        <div id="coverageTable" class="coverage-table"></div>
        <div id="orderSummary" hidden>
          <h3 class="aside-title">📦 Order Summary</h3>
          <div id="orderContent"></div>
        </div>
      </aside>

    </main>
  </div>
  <canvas id="srcCanvas" hidden></canvas>
  <script src="app.js"></script>
</body>
</html>
